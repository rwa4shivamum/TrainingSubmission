<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container my-4">

  <!-- Carousel -->
  <div id="carouselExample" class="carousel slide mb-4" data-bs-ride="carousel">
    <div class="carousel-inner">
      <div class="carousel-item active">
        <img src="https://via.placeholder.com/800x300" class="d-block w-100">
      </div>
      <div class="carousel-item">
        <img src="https://via.placeholder.com/800x300" class="d-block w-100">
      </div>
    </div>
  </div>

  <!-- Cards + List Group -->
  <div class="row mb-4">
    <div class="col-md-4">
      <div class="card">
        <div class="card-body">
          <h5 class="card-title">Student</h5>
          <ul class="list-group">
            <li class="list-group-item">HTML</li>
            <li class="list-group-item">CSS</li>
          </ul>
        </div>
      </div>
    </div>
  </div>

  <!-- Form -->
  <form class="mb-4">
    <input type="text" class="form-control mb-2" placeholder="Name">
    <select class="form-select mb-2">
      <option>Select Course</option>
      <option>React</option>
    </select>

    <div class="form-check">
      <input class="form-check-input" type="checkbox"> Agree
    </div>

    <div class="form-check">
      <input class="form-check-input" type="radio" name="r"> Male
    </div>

    <div class="input-group mt-2">
      <span class="input-group-text">@</span>
      <input type="text" class="form-control">
    </div>
  </form>

  <!-- Tabs -->
  <ul class="nav nav-tabs mb-3">
    <li class="nav-item">
      <button class="nav-link active">Profile</button>
    </li>
    <li class="nav-item">
      <button class="nav-link">Settings</button>
    </li>
  </ul>

  <!-- Pagination -->
  <ul class="pagination mb-4">
    <li class="page-item"><a class="page-link">1</a></li>
    <li class="page-item"><a class="page-link">2</a></li>
  </ul>

  <!-- Alert -->
  <div class="alert alert-success">Form Submitted!</div>

  <!-- Accordion -->
  <div class="accordion mb-4" id="accordionExample">
    <div class="accordion-item">
      <h2 class="accordion-header">
        <button class="accordion-button" data-bs-toggle="collapse" data-bs-target="#collapseOne">
          Question 1
        </button>
      </h2>
      <div id="collapseOne" class="accordion-collapse collapse show">
        <div class="accordion-body">Answer 1</div>
      </div>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress mb-4">
    <div class="progress-bar" style="width: 60%">60%</div>
  </div>

  <!-- Tooltip + Popover -->
  <button class="btn btn-primary me-2" data-bs-toggle="tooltip" title="Tooltip">Hover</button>
  <button class="btn btn-secondary" data-bs-toggle="popover" title="Popover" data-bs-content="Details">Click</button>

  <!-- Toast -->
  <div class="toast show mt-3">
    <div class="toast-body">Saved Successfully!</div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
  tooltipTriggerList.map(function (tooltipTriggerEl) {
    return new bootstrap.Tooltip(tooltipTriggerEl)
  })

  var popoverTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="popover"]'))
  popoverTriggerList.map(function (popoverTriggerEl) {
    return new bootstrap.Popover(popoverTriggerEl)
  })
</script>

</body>
</html>
